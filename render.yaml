services:
  - type: web
    name: chitragupt-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        value: https://chitragupt-topaz.vercel.app
      # Note: Database and API secrets should be added via the Render dashboard security tab
